name: Run Tests

on:
  push:
    branches: [main]
    paths:
      - 'configs/**'
      - 'mqed/**'
      - 'test/**'
      - 'pyproject.toml'
      - 'setup.py'
      - 'environment.yaml'
      - 'environment_windows.yaml'
      - '.github/workflows/tests.yml'
  pull_request:
    paths:
      - 'configs/**'
      - 'mqed/**'
      - 'test/**'
      - 'pyproject.toml'
      - 'setup.py'
      - 'environment.yaml'
      - 'environment_windows.yaml'
      - '.github/workflows/tests.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Run pytest
        run: pytest

# Minimal defaults just to name the job
defaults:
  - hydra: default #<- This loads configs/Lindblad/hydra/default.yaml
  - _self_

hydra:
  job:
    name: NHSE_disorder

# --- Inputs (adjust the path or use oc.env as needed) ---
greens:
  h5_path: ${oc.env:MQED_ROOT,${hydra:runtime.cwd}}/data/GF_cache/result_Ag_2_nm_latest.hdf5

# Material information
material:
  name: silver

# --- Simulation controls ---
simulation:
  t_ps:
    start: 0.0
    stop: 150.0
    output_step: 2e-3

  Nmol: 100
  d_nm: 2.0

  # orientation
  mu_D_debye: 3.8
  mu_A_debye: 3.8
  theta_deg: 90.0
  phi_deg: magic
  mode: disorder
  disorder_sigma_phi_deg: 10.0   # <-- set your sigma here

# Initial condition
initial_state:
  type: single_site
  site_index: 51
  center_site: null
  sigma_sites: 6.0
  k_parallel: 0.0

# NHSE is faster and sufficient
solver:
  method: NonHermitian

# Ensemble averaging knobs
disorder:
  backend: joblib
  n_realizations: 1000
  seed: 2025
  n_jobs: -1
  mpi_auto_launch: false
  mpi_nproc: 8
  mpi_exec: mpirun
  save_each: false   # true = save per-realization files too

observables:
  - name: root_MSD
    kind: derived
    enabled: true

  - name: X_shift
    kind: operator

  - name: X_shift2
    kind: operator

output:
  filename: ${material.name}_sigma${simulation.disorder_sigma_phi_deg}_avg_latest.hdf5
  save_legacy_aliases: true

plot_settings:
  save_plot: true
  filename: planar_enhancement_compare_V_three_heights.png
  dpi: 300
  show: false
  tight_layout: true
  grid: false
  legend: true
  figsize: [8, 6]

  xlabel: "$\\Delta x$ (nm)"
  ylabel: "DDI ratio"
  title: null

  xscale: linear
  yscale: linear
  xlim: [1, 40]
  ylim: null

  # label suffixes appended automatically
  real_label_suffix: " $V/V^{0}$"
  imag_label_suffix: " $\\Gamma/\\Gamma^{0}$"

  font:
    family: null
    labelsize: 16
    ticksize: 24
    legendsize: 16
    titlesize: 24
    labelweight: normal
    legendweight: normal

  vlines:
    enabled: True
    xs: [3,6]
    colors: ["tab:red", "tab:green"]
    style: "--"
    lw: 1.5
    alpha: 0.8

  lw: 2.5

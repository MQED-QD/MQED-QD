defaults:
  - hydra: default
  - _self_

hydra:
  job:
    name: plot_compare_enhancement

# Shared GF settings (used by all curves unless curve.gf overrides)
gf_settings:
  x_key: Rx_nm
  energy_index: 0
  dipoles:
    donor: {theta_deg: 0.0, phi_deg: 0.0}
    acceptor: {theta_deg: 0.0, phi_deg: 0.0}

curves:
  - label: "Plane 2nm"
    use_latest_glob: "${oc.env:MQED_ROOT,${hydra:runtime.cwd}}/data/GF_cache/Fresnel_GF_planar_Ag_height_2nm_665nm.hdf5"
    components: [real]
    style_real: "-"
    style_imag: "--"
    color: "blue"
    lw: 2.0

  - label: "Plane 5nm"
    use_latest_glob: "${oc.env:MQED_ROOT,${hydra:runtime.cwd}}/data/GF_cache/Fresnel_GF_planar_Ag_height_5nm_665nm.hdf5"
    components: [real]
    style_real: "-"
    style_imag: "--"
    color: "orange"
    lw: 2.0

  - label: "Plane 8nm"
    use_latest_glob: "${oc.env:MQED_ROOT,${hydra:runtime.cwd}}/data/GF_cache/Fresnel_GF_planar_Ag_height_8nm_665nm.hdf5"
    components: [real]
    style_real: "-"
    style_imag: "--"
    color: "red"
    lw: 2.0
  

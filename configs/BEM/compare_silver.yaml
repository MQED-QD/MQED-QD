defaults:
  - _self_
  - hydra: default  # <-- 

hydra:
  job:
    name: compare_ez
log_file: ${hydra:runtime.output_dir}/${hydra.job.name}.log

# ---- Data source selection ------------------------------------------------
# "bem"  → reads BEM Excel files (original behavior)
# "meep" → reads MEEP HDF5 files (planar_example.py output)
simulation_source: bem

paths:
  # lets you override with MQED_ROOT=/abs/path/to/repo
  root: ${oc.env:MQED_ROOT,${hydra:runtime.cwd}}
  data_dir: ${paths.root}/mqed/BEM

  # Fresnel / analytical reference (always required)
  dgf_h5: ${paths.data_dir}/Fresnel_result/Fresnel_GF_planar_Ag_height_5nm_665nm.hdf5

  # BEM Excel files (used when simulation_source: bem)
  bem_plane_xlsx: ${paths.data_dir}/BEM_result/dipole_silver_planar_height_5nm_results_665nm.xlsx
  bem_vacuum_xlsx: ${paths.data_dir}/BEM_result/dipole_vacuum_2nm_results.xlsx

  # MEEP HDF5 files (used when simulation_source: meep)
  meep_dir: ${paths.root}/mqed/MEEP
  meep_plane_h5: ${paths.meep_dir}/MEEP_planar_silver_665nm_2D.h5
  meep_vacuum_h5: ${paths.meep_dir}/MEEP_planar_vacuum_665nm_2D.h5


dipole_frequency: 1.864  # example value (your units)

data:
  x_key: Rx_nm
  energy_index: 0

bem:
  sheet: FieldLine
  re_col: Re_Ez
  im_col: Im_Ez

meep:
  component: Ez

dipoles:
  donor: {theta_deg: 0.0, phi_deg: 0.0}
  acceptor: {theta_deg: 0.0, phi_deg: 0.0}

test:
  enabled: true
  rtol: 1e-3
  atol: 1e-6

plot:
  dpi: 140
  figsize: [11, 6]
  save: True
  save_path: silver_ez_enhancement.png

  rcParams:
    font.size: 18
    axes.labelsize: 16
    axes.titlesize: 16
    legend.fontsize: 12
    xtick.labelsize: 12
    ytick.labelsize: 18

  axes:
    title: " $\\omega_0 = {dipole_frequency} ~\\mathrm{{eV}}$"
    xlabel: "Distance $R_x$ (nm)"
    ylabel: "$Enhancement(Normalized)$"
    xlim: [0, 50]
    ylim: null
    grid: false
    spine_width: 1.2
    yscale: "log" # optional, can be "linear" or "log"

    ticks:
      direction: "in"
      top: true
      right: true
      labelsize: 12
      length: 6
      width: 1.2

  legend:
    loc: "best"
    # bbox_to_anchor: [1.02, 0.5]
    frameon: true
    fancybox: false
    framealpha: 1.0
    fontsize: 12
    edgecolor: "0.5"

  # what to draw first/last
  series_order: [sim_real, sim_imag, impl_real, impl_imag]

  series:
    sim_real:
      source: "sim_real"
      label: "$V/V^{0}$ (numerical)"
      linestyle: "None"
      marker: "o"
      markersize: 7
      markerfacecolor: "none"
      markeredgewidth: 1.6
      color: "m"

    sim_imag:
      source: "sim_imag"
      label: "$\\Gamma/\\Gamma^{0}$ (numerical)"
      linestyle: "None"
      marker: "s"
      markersize: 7
      markerfacecolor: "none"
      markeredgewidth: 1.6
      color: "c"

    impl_real:
      source: "impl_real"
      label: "$V/V^{0}$ (Analytical)"
      linestyle: "-"
      linewidth: 2.7
      color: "r"

    impl_imag:
      source: "impl_imag"
      label: "$\\Gamma/\\Gamma^{0}$ (Analytical)"
      linestyle: "-"
      linewidth: 2.7
      color: "b"

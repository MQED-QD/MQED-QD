defaults:
  - hydra: default
  - _self_

hydra:
  job:
    name: plot_ipr

curves:
  # Example stationary vs disorder-avg
  - label: "Fresnel"
    use_latest_glob: "${oc.env:MQED_ROOT,${hydra:runtime.cwd}}/data/QDyn_cache/Fresnel_silver_stationary_665nm.hdf5"
    style: "-"
    lw: 2
    color: "blue"
  - label: "BEM"
    use_latest_glob: "${oc.env:MQED_ROOT,${hydra:runtime.cwd}}/data/QDyn_cache/BEM_silver_stationary_665nm.hdf5"
    style: "--"
    lw: 2
    color: "orange"
  # - label: "σ=10 disorder"

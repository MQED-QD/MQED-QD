plot_settings:
  save_plot: true
  geometry: planar # or other geometries, 'sphere', 'nanorod', etc.
  material: silver
  excitation_position_nm: middle # or 'top', 'bottom', 'middle', etc.
  filename: "${plot_settings.geometry}_${plot_settings.material}_${plot_settings.excitation_position_nm}_ipr_comparison.png"
  dpi: 400
  show: false
  tight_layout: true
  grid: false # Enable grid for true, or False to disable
  legend: true
  figsize: [7.5, 5.0]

  # Choose by indices OR by time (ps)
  x_range_ps: [0.0, 150.0]
  # x_index_range: [0, 500]

  xlabel: "t (ps)"
  ylabel: "IPR (site basis)"
  title: null # or choose your own title, "Silver; Middle Excitation — IPR"
  xscale: linear
  yscale: linear
  xlim: null
  ylim: null

  font:
    family: null        # e.g. "DejaVu Sans", "Times New Roman"; null keeps default
    labelsize: 12
    ticksize: 12
    legendsize: 12
    titlesize: 12
    labelweight: bold   # "normal" or "bold"
    legendweight: bold  # "normal" or "bold"


  # If your file stores ipr_std (disorder avg), shade ±1σ
  shade_std: true

  # Optional time unit conversion (keep 1.0 if already ps)
  x_scale_factor: 1.0

  lw: 1.6

#plotting configuration for sqrt MSD vs time
defaults:
  - hydra: default  # <-- 
  - _self_
# Where to put the PNG (Hydra will create a run dir)
hydra:
  job:
    name: plot_sqrt_msd

# One or more curves to draw on the same axes
# Each curve: either give absolute 'path', or set 'use_latest_glob' (relative to MQED_ROOT/PWD)
curves:
  # - label: "Magic-Angle"
  #   use_latest_glob: "${oc.env:MQED_ROOT,${hydra:runtime.cwd}}/data/QDyn_cache/silver_stationary_latest.hdf5"  # or using "outputs/Lindblad/.../qdyn_result.hdft"
  #   style: "-"         # matplotlib line format
  #   lw: 1.5
  # - label: "σ=10"
  #   use_latest_glob: "${oc.env:MQED_ROOT,${hydra:runtime.cwd}}/data/QDyn_cache/silver_sigma10_avg_latest.hdf5" # or using "outputs/NHSE_disorder/.../qdyn_disorder_avg.hdft"
  #   style: "-"         # e.g., "C1-"
  #   lw: 1.5

  - label: "planar"
    use_latest_glob: "${oc.env:MQED_ROOT,${hydra:runtime.cwd}}/data/QDyn_cache/intermol_8nm/Fresnel_silver_planar_665nm_N30.hdf5"  # or using "outputs/Lindblad/.../qdyn_result.hdft"
    style: "-"         # matplotlib line format
    lw: 2
    color: "blue" # optional color specification (e.g., "blue", "C0", "#1f77b4")

  - label: "planar_NN"
    use_latest_glob: "${oc.env:MQED_ROOT,${hydra:runtime.cwd}}/data/QDyn_cache/intermol_8nm/Fresnel_silver_planar_665nm_N30_NN.hdf5"  # or using "outputs/Lindblad/.../qdyn_result.hdft"
    style: "--"         # matplotlib line format
    lw: 2
    color: "blue"

  - label: "nanorod"
    use_latest_glob: "${oc.env:MQED_ROOT,${hydra:runtime.cwd}}/data/QDyn_cache/intermol_8nm/BEM_silver_nanorod_665nm_N30.hdf5"  # or using "outputs/Lindblad/.../qdyn_result.hdft"
    style: "-"         # matplotlib line format
    lw: 2
    color: "orange"
  
  - label: "nanorod_NN"
    use_latest_glob: "${oc.env:MQED_ROOT,${hydra:runtime.cwd}}/data/QDyn_cache/intermol_8nm/BEM_silver_nanorod_665nm_N30_NN.hdf5"  # or using "outputs/Lindblad/.../qdyn_result.hdft"
    style: "--"         # matplotlib line format
    lw: 2
    color: "orange"

plot_settings:
  save_plot: true
  filename: "silver_middle_sqrt_msd.png"
  dpi: 400
  show: false
  tight_layout: true
  grid: true
  legend: true
  figsize: [7.5, 5.0]

  # x selection (time). Choose one: x_range_ps or x_index_range
  x_range_ps: [0.0, 150.0]   # in picoseconds
  # x_index_range: [0, 500]

  # axis labels, scales, limits
  xlabel: "t (ps)"            # or "t (ps)" if you keep in ps
  ylabel: "$\\Delta x$ (nm)"
  title: "Silver; Middle Excitation"
  xscale: linear             # or "log"
  yscale: linear
  xlim: null
  ylim: null

  # optional multiply time axis (e.g., to show ×10^-10 s visually):
  x_scale_factor: 1.0        # keep 1.0 if you already saved 't_ps' in seconds; use 1e-12 to convert ps→s
  lw: 1.5

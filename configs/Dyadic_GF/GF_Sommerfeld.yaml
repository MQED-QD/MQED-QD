# Add this defaults list to integrate loguru with Hydra's logging
defaults:
  - hydra: default  # <-- This loads configs/Dyadic_GF/hydra/default.yaml
  - _self_

# ADD THIS SECTION to set a custom name for the output directory
hydra:
  job:
    name: Dyadic_GF_Sommerfeld
# --- Our Application Configuration ---

material:
  # Choose dielectric source mode (case-insensitive):
  #   - excel           : interpolate epsilon from wavelength-column Excel data
  #   - constant        : fixed complex epsilon independent of frequency
  #   - Drude           : eps_inf - omega_p^2 / (omega^2 + i*gamma*omega)
  #   - Drude-Lorentz   : Drude term + Lorentz oscillators
  #
  # Notes on model parameter units:
  #   For every frequency-like parameter, provide exactly one key in either
  #   eV or rad/s form, e.g. omega_p_eV OR omega_p_rad_s (not both).
  source_type: excel

  # --- Settings for a CONSTANT material ---
  # This value is used only if source_type is 'constant'
  constant_value: 9.0+0.0j # Example for a non-dispersive material

  # --- Settings for an EXCEL-based material ---
  # This section is used only if source_type is 'excel'
  excel_config:
    filepath: "DielectricFunction/dielectric function.xlsx"
    sheet_name: "Ag_BEM"

  # --- Settings for a DRUDE model ---
  # Used only if source_type is 'Drude' (or 'drude').
  drude_config:
    eps_inf: 1.0
    omega_p_eV: 9.01
    gamma_eV: 0.048

  # --- Settings for a DRUDE-LORENTZ model ---
  # Used only if source_type is 'Drude-Lorentz' (or equivalent normalized form).
  # Model implemented in DataProvider:
  #   eps = eps_inf - omega_p^2/(omega^2 + i*gamma_D*omega)
  #         + sum_j [ f_j*omega_0j^2/(omega_0j^2 - omega^2 - i*gamma_j*omega) ]
  drude_lorentz_config:
    eps_inf: 1.0
    omega_p_eV: 9.01
    gamma_eV: 0.048
    oscillators:
      # strength = f_j (dimensionless)
      # omega_0_* = resonance frequency
      # gamma_* = damping
      - strength: 0.85
        omega_0_eV: 3.8
        gamma_eV: 0.25
      - strength: 0.20
        omega_0_eV: 4.9
        gamma_eV: 0.35

simulation:
  material: "Ag" # Material surface
  spectral_param: "energy_eV" # Choose between 'wavelength_nm' or 'energy_eV'
  energy_eV: 
  # Emitter energy, unit in eV, can be a single value, dictionary, or list.
  #Examples:
  # Single value: 1.50 (int or float)
  # Dictionary: {min: 1.0, max: 3.0, points: 201} (for a range)
  # List: [1.0, 1.5, 2.0]
  # Piecewise list of ranges:
  #   - {min: 0.0, max: 3.0, points: 21}
  #   - {min: 3.0, max: 4.5, points: 301}
  #   - {min: 4.5, max: 6.0, points: 21}
    min: 1.0
    max: 1.0 # Set min and max to the same value for a single point
    points: 1

  wavelength_nm: # same usage as energy_eV, including piecewise range lists
    min: 500.0
    max: 500.0
    points: 1
  position:
    zD: 5.0e-9
    zD_nm: 5 # Key for name
    zA: 5.0e-9
    Rx_nm: # New section to define the range of horizontal distances
      start: 0.0
      stop: 300.0
      points: 301 # This will give you points 1, 2, 3, ..., 1000

  # Numerical integration controls
  integration:
    qmax: null          # optional finite cutoff for evanescent tail; null -> inf
    epsabs: 1.0e-10     # absolute tolerance for quadrature
    epsrel: 1.0e-10     # relative tolerance for quadrature
    limit: 400          # max subintervals for quad_vec
    split_propagating: true  # if true, split at k0 to treat propagating/evanescent separately

# ── Parallel execution ─────────────────────────────────────────────
# Controls how the multi-frequency loop is parallelized.
#
#   backend:  "sequential"  – no parallelism (default, simplest)
#             "joblib"      – shared-memory multiprocessing via joblib
#                             Good for laptops/workstations.
#             "mpi"         – distributed parallelism via mpi4py
#                             Good for HPC clusters.
#
#   n_jobs:   Number of joblib workers.
#             -1 = use all available CPU cores (recommended).
#             Ignored when backend != "joblib".
#
#   mpi_nproc:      Number of MPI ranks to spawn (if auto-launching).
#   mpi_auto_launch: If true AND not already running under MPI,
#                    re-launch the script with mpiexec automatically.
#   mpi_exec:       Path to mpiexec binary.
#
# NOTE: Parallelization is over the *energy* (frequency) axis.
#       Each energy point is fully independent — no communication
#       is needed between workers.
parallel:
  backend: sequential
  n_jobs: -1
  mpi_nproc: 4
  mpi_auto_launch: true
  mpi_exec: mpiexec

output:
  prefix: "Fresnel_GF_planar_${simulation.material}_height_${simulation.position.zD_nm}nm"

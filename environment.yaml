name: mqed

channels:
  - conda-forge
  - defaults

dependencies:
  # anchor the interpreter; change to 3.11 if you prefer that series
  - python>=3.10,<3.13

  # numerics / data
  - numpy>=1.24,<3
  - scipy>=1.11,<2
  - pandas>=2,<3
  - h5py>=3.10,<4
  - lmdb

  # viz / notebooks
  - matplotlib>=3.7,<4
  - seaborn>=0.13,<1
  - jupyter
  - pillow
  - tqdm>=4.66,<5
  - pyqt

  # quantum / simulation stack
  - qutip>=5,<6
  - mpb
  - pymeep
  - h5utils
  - harminv
  - fftw
  - gsl
  - cairo

  # multiprocess
  - joblib>=1.3,<2

  # mpi
  - openmpi
  - mpi4py

  # testing
  - pytest>=8,<9

  # pip (loose like your example; pin major if you want)
  - pip>=23,<25
  - pip:
      - hydra-core>=1.3,<2
      - hydra-colorlog>=1.2,<2
      - hydra-optuna-sweeper>=1.2,<2
      - optuna>=2.10,<3
      - rootutils>=1,<2
      - gitpython>=3.1,<4
      - loguru>=0.7,<1
      - sphinx
      - furo
      - rich>=13,<15
      - pyvista[all]
      - sqlalchemy
      - alembic
      - openpyxl>=3.1,<4
